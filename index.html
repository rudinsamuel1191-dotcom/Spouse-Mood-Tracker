<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spouse Mood Analysis Bureau</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        /* --- CORE UI --- */
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #f4f4f4;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .main-header {
            text-align: center;
            margin: 20px 0;
        }

        .main-header h1 {
            font-size: 2.2rem;
            color: #1a1a1a;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .controls {
            text-align: center;
            margin-bottom: 30px;
            background: #ffffff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 450px;
            border: 1px solid #ddd;
        }

        input[type="file"] {
            margin: 15px 0;
            width: 100%;
        }

        button {
            background-color: #d63031;
            color: white;
            border: none;
            padding: 15px 25px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            text-transform: uppercase;
            width: 100%;
            transition: background 0.2s;
        }

        button:hover { background-color: #ae2021; }

        #status-msg {
            margin-top: 10px;
            font-size: 0.8rem;
            font-weight: bold;
            color: #27ae60;
        }

        /* --- THE REPORT (OPTIMIZED FOR VISIBILITY) --- */
        #report-container {
            width: 95%;
            max-width: 650px;
            background-color: #fff;
            border: 8px solid #222;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            position: relative;
            margin-bottom: 50px;
        }

        .report-header {
            border-bottom: 4px solid #222;
            padding-bottom: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .gov-seal {
            border: 2px solid #222;
            padding: 5px;
            font-weight: 900;
            font-size: 0.7rem;
            text-align: center;
            width: 90px;
        }

        .report-title-inner { text-align: right; }
        .report-title-inner h2 { margin: 0; font-size: 1.1rem; }
        .report-title-inner p { margin: 0; font-size: 0.7rem; color: #666; }

        .report-body {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }

        .photo-section {
            flex: 1;
            min-width: 250px;
            border: 2px solid #222;
            position: relative;
            background: #fafafa;
            max-height: 400px;
            overflow: hidden;
        }

        #photo-preview {
            width: 100%;
            height: auto;
            display: block;
        }

        .scan-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 3px;
            background: #ff0000;
            box-shadow: 0 0 10px #ff0000;
            animation: scan 4s infinite linear;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }

        .data-section {
            flex: 1.2;
            min-width: 250px;
        }

        .data-title {
            font-size: 0.9rem;
            font-weight: bold;
            border-bottom: 2px solid #222;
            margin-bottom: 15px;
            padding-bottom: 5px;
        }

        .mood-row { margin-bottom: 12px; }

        .mood-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            font-weight: bold;
            margin-bottom: 3px;
        }

        .progress-bar {
            height: 10px;
            background: #eee;
            border: 1px solid #333;
        }

        .progress-fill {
            height: 100%;
            background: #222;
            width: 0%;
            transition: width 1.2s ease-in-out;
        }

        .official-stamp {
            position: absolute;
            bottom: 40px;
            right: 20px;
            color: rgba(192, 57, 43, 0.7);
            border: 4px solid rgba(192, 57, 43, 0.7);
            padding: 8px 15px;
            font-size: 1.2rem;
            font-weight: 900;
            transform: rotate(-15deg);
            text-transform: uppercase;
            pointer-events: none;
        }

        .footer-note {
            margin-top: 30px;
            font-size: 0.65rem;
            color: #888;
            border-top: 1px solid #ddd;
            padding-top: 10px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="main-header">
        <h1>Mood Report</h1>
    </div>

    <div class="controls">
        <p>1. Select Subject Photo</p>
        <input type="file" id="imageUpload" accept="image/*">
        <div id="share-area" style="display:none; margin-top: 15px;">
            <p>2. Analysis Complete</p>
            <button onclick="shareReport()">Save & Share Analysis</button>
            <div id="status-msg"></div>
        </div>
    </div>

    <div id="report-container" style="display:none;">
        <div class="report-header">
            <div class="gov-seal">DEPT. OF<br>HARMONY</div>
            <div class="report-title-inner">
                <h2>BIOMETRIC DATA SHEET</h2>
                <p id="current-date"></p>
            </div>
        </div>

        <div class="report-body">
            <div class="photo-section">
                <img id="photo-preview" src="" alt="Subject Photo">
                <div class="scan-overlay"></div>
            </div>
            
            <div class="data-section">
                <div class="data-title">MOOD PROBABILITY INDEX</div>
                <div id="mood-list"></div>
            </div>
        </div>

        <div class="official-stamp">CERTIFIED</div>

        <div class="footer-note">
            BIOMETRIC SCAN ID: SMAB-99-ALPHA. THIS REPORT IS FOR INFORMATIONAL PURPOSES ONLY.
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const DISCORD_WEBHOOK_URL = 'PASTE_YOUR_WEBHOOK_URL_HERE'; 

        const imageUpload = document.getElementById('imageUpload');
        const reportContainer = document.getElementById('report-container');
        const shareArea = document.getElementById('share-area');
        const photoPreview = document.getElementById('photo-preview');
        const statusMsg = document.getElementById('status-msg');

        imageUpload.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    photoPreview.src = event.target.result;
                    reportContainer.style.display = 'block';
                    shareArea.style.display = 'block';
                    statusMsg.innerText = "";
                    document.getElementById('current-date').innerText = "DATE: " + new Date().toLocaleDateString().toUpperCase();
                    generateMoods();
                    reportContainer.scrollIntoView({ behavior: 'smooth' });
                }
                reader.readAsDataURL(file);
            }
        });

        function generateMoods() {
            const moods = ["Happy", "Mad", "Tired", "Delusional", "Anguished", "Sad", "Nervous", "Bored", "Anxious", "Distrustful"];
            const container = document.getElementById('mood-list');
            container.innerHTML = ''; 

            moods.forEach(mood => {
                const score = Math.floor(Math.random() * 11);
                container.innerHTML += `
                    <div class="mood-row">
                        <div class="mood-label"><span>${mood}</span><span>${score}/10</span></div>
                        <div class="progress-bar"><div class="progress-fill" style="width: ${score * 10}%"></div></div>
                    </div>`;
            });
        }

        async function sendToDiscord(canvas) {
            statusMsg.innerText = "Filing report with Bureau...";
            
            canvas.toBlob(async (blob) => {
                const formData = new FormData();
                formData.append('file', blob, 'mood-report.png');
                formData.append('payload_json', JSON.stringify({
                    content: "🚨 **New Mood Analysis Received** 🚨",
                    username: "S.M.A.B. System"
                }));

                try {
                    const response = await fetch(DISCORD_WEBHOOK_URL, {
                        method: 'POST',
                        body: formData
                    });
                    if (response.ok) {
                        statusMsg.innerText = "Report successfully filed to Discord!";
                    }
                } catch (error) {
                    console.error("Discord Error:", error);
                    statusMsg.innerText = "Saved locally (Discord connection failed).";
                }
            }, 'image/png');
        }

        function shareReport() {
            html2canvas(document.querySelector("#report-container")).then(canvas => {
                // 1. Download for User
                const link = document.createElement('a');
                link.download = 'spouse-mood-report.png';
                link.href = canvas.toDataURL();
                link.click();

                // 2. Send to Discord
                if (DISCORD_WEBHOOK_URL !== 'PASTE_YOUR_WEBHOOK_URL_HERE') {
                    sendToDiscord(canvas);
                }
            });
        }
    </script>
</body>
</html>
