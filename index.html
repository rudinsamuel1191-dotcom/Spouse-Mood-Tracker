<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spouse Mood Analysis Bureau</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        /* --- UI DESIGN --- */
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #e5e5e5;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .controls {
            text-align: center;
            margin-bottom: 30px;
            background: white;
            padding: 25px;
            border-radius: 4px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            max-width: 500px;
            border: 2px solid #333;
        }

        h1 { margin-top: 0; font-size: 1.5rem; color: #2c3e50; }

        input[type="file"] {
            margin: 20px 0;
            display: block;
            width: 100%;
        }

        button {
            background-color: #2c3e50;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            letter-spacing: 1px;
        }

        button:hover { background-color: #c0392b; }

        /* --- THE OFFICIAL REPORT (CAPTURE AREA) --- */
        #report-container {
            width: 600px;
            background-color: #fff;
            border: 10px solid #222;
            padding: 40px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            position: relative;
        }

        .report-header {
            border-bottom: 5px solid #222;
            padding-bottom: 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .gov-seal {
            border: 4px solid #222;
            padding: 10px;
            font-weight: 900;
            text-align: center;
            width: 120px;
            line-height: 1.1;
        }

        .report-title h2 {
            margin: 0;
            text-decoration: underline;
            font-size: 1.4rem;
        }

        .report-body {
            display: flex;
            gap: 30px;
        }

        .photo-section {
            flex: 1;
            border: 3px solid #222;
            height: 250px;
            position: relative;
            background: #eee;
        }

        #photo-preview {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* The Red Scan Line Animation */
        .scan-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 4px;
            background: red;
            box-shadow: 0 0 8px red;
            animation: scan 3s infinite linear;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }

        .data-section { flex: 1.5; }

        .mood-row { margin-bottom: 12px; }

        .mood-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .progress-bar {
            height: 12px;
            background: #ddd;
            border: 1px solid #222;
        }

        .progress-fill {
            height: 100%;
            background: #222;
            width: 0%;
            transition: width 1s ease-in-out;
        }

        .official-stamp {
            position: absolute;
            bottom: 60px;
            right: 40px;
            color: rgba(192, 57, 43, 0.8);
            border: 5px solid rgba(192, 57, 43, 0.8);
            padding: 10px 20px;
            font-size: 1.5rem;
            font-weight: 900;
            transform: rotate(-20deg);
            text-transform: uppercase;
            pointer-events: none;
        }

        .footer-note {
            margin-top: 40px;
            font-size: 0.7rem;
            color: #777;
            border-top: 1px solid #ccc;
            padding-top: 10px;
        }
    </style>
</head>
<body>

    <div class="controls">
        <h1>S.M.A.B. BIOMETRIC UPLOAD</h1>
        <p>Upload subject photo for mood recalibration.</p>
        <input type="file" id="imageUpload" accept="image/*">
        <button id="shareBtn" style="display:none;" onclick="shareReport()">Download & Share Report</button>
    </div>

    <div id="report-container" style="display:none;">
        <div class="report-header">
            <div class="gov-seal">DEPT. OF HARMONY</div>
            <div class="report-title">
                <h2>MOOD ANALYSIS REPORT</h2>
                <p id="report-id">REF: SCAN-88291-B</p>
            </div>
        </div>

        <div class="report-body">
            <div class="photo-section">
                <img id="photo-preview" src="" alt="Subject">
                <div class="scan-overlay"></div>
            </div>
            
            <div class="data-section" id="mood-list">
                </div>
        </div>

        <div class="official-stamp">VERIFIED</div>

        <div class="footer-note">
            <p>WARNING: This report is legally binding in some fictional jurisdictions. Analysis generated on: <span id="current-date"></span></p>
        </div>
    </div>

    <script>
        const imageUpload = document.getElementById('imageUpload');
        const reportContainer = document.getElementById('report-container');
        const shareBtn = document.getElementById('shareBtn');
        const photoPreview = document.getElementById('photo-preview');

        imageUpload.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    photoPreview.src = event.target.result;
                    reportContainer.style.display = 'block';
                    shareBtn.style.display = 'inline-block';
                    document.getElementById('current-date').innerText = new Date().toLocaleDateString();
                    generateMoods();
                }
                reader.readAsDataURL(file);
            }
        });

        function generateMoods() {
            const moods = ["Happy", "Mad", "Tired", "Delusional", "Anguished", "Sad", "Nervous", "Bored", "Anxious", "Distrustful"];
            const container = document.getElementById('mood-list');
            container.innerHTML = '<strong>BIOMETRIC SCALE (0-10)</strong><br><br>';

            moods.forEach(mood => {
                const score = Math.floor(Math.random() * 11); // Replace with face-api data later
                container.innerHTML += `
                    <div class="mood-row">
                        <div class="mood-label"><span>${mood}</span><span>${score}/10</span></div>
                        <div class="progress-bar"><div class="progress-fill" style="width: ${score * 10}%"></div></div>
                    </div>`;
            });
        }

        function shareReport() {
            html2canvas(document.querySelector("#report-container")).then(canvas => {
                const link = document.createElement('a');
                link.download = 'spouse-mood-report.png';
                link.href = canvas.toDataURL();
                link.click();
            });
        }
    </script>
</body>
</html>
